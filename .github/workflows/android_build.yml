name: Flutter Android Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and Prepare
        run: |
          # Ensure no zero-byte files interfere with the build
          find android -type f -size 0 -delete
          # Clean old icons and splash
          find android/app/src/main/res -name "launcher_icon.*" -delete
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build arm64-v8a APK
        run: |
          # Build only for arm64-v8a architecture to save time
          # This will output to build/app/outputs/flutter-apk/app-release.apk
          flutter build apk --release --target-platform android-arm64

      - name: Upload arm64 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: build/app/outputs/flutter-apk/app-release.apk
