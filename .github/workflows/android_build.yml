name: Flutter Android Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Search and Destroy Corrupted Files
        run: |
          # 1. Delete EVERY 0-byte file in the android folder (these crash the build)
          find android -type f -size 0 -delete
          
          # 2. Delete the specific old icon files that keep causing errors
          find android/app/src/main/res -name "launcher_icon.*" -delete
          
          # 3. Regenerate all icons and splash screens fresh from your valid assets
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
