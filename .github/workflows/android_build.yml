name: Flutter Android Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Clean and Prepare
        run: |
          find android -type f -size 0 -delete
          find android/app/src/main/res -name "launcher_icon.*" -delete
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create
      - name: Generate Flutter build files
        run: flutter build apk --config-only || true
      - name: Patch Gradle files
        run: |
          sed -i 's/id("com.android.application") version "[^"]*"/id("com.android.application") version "8.3.2"/' android/settings.gradle.kts
          echo "android.newDsl=false" >> android/gradle.properties
      - name: Build APK via Gradle directly
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: android/app/build/outputs/apk/release/*.apk
