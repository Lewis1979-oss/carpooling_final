name: carpool_final
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  provider: ^6.1.1
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  http: ^1.1.0
  shimmer: ^3.0.0
  uuid: ^4.2.1
  image_picker: ^1.0.7
  video_player: ^2.8.1
  shared_preferences: ^2.2.2
  record: 5.1.0
  speech_to_text: ^7.3.0
  path_provider: ^2.1.2
  tutorial_coach_mark: ^1.2.9
  flutter_compass: ^0.8.1
  sensors_plus: ^6.1.1
  share_plus: ^10.1.0
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1
  audioplayers: ^5.2.1
  audio_waveforms: ^1.0.5
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

dependency_overrides:
  record_platform_interface: 1.2.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#1A1A1A"
  image: "assets/icon/app_icon.png"
  android_12:
    image: "assets/icon/app_icon.png"
    color: "#1A1A1A"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/videos/
    - assets/images/
    - assets/sounds/
